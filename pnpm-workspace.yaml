packages:
  - packages/*

allowBuilds:
  '@swc/core': true
  esbuild: false

publicHoistPattern:
  - typescript
  - '@types/*'
  - '@biomejs/*'
  - '@swc/*'
  - vitest
  - '@vitest/*'
  - tsx
  - turbo
  - del-cli

catalog:
  '@logtape/logtape': ^2.2.3
  '@opentelemetry/api': ^1.9.1
  '@opentelemetry/api-logs': ^0.220.0
  '@standard-schema/spec': ^1.1.0
  ajv: ^8.20.0
  ajv-formats: ^3.0.1
  canonicalize: 3.0.0
  expo-crypto: ^57.0.0
  json-schema-to-ts: ^3.1.1
  uint8arrays: ^6.1.1

catalogMode: prefer

minimumReleaseAgeExclude:
  - '@kigu/*'

supportedArchitectures:
  cpu: [ current ]
  os: [ current ]
