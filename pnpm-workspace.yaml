packages:
  - packages/*

allowBuilds:
  '@swc/core': true
  esbuild: false

nodeLinker: hoisted

catalog:
  '@logtape/logtape': ^2.2.1
  '@opentelemetry/api': ^1.9.1
  '@opentelemetry/api-logs': ^0.219.0
  '@standard-schema/spec': ^1.1.0
  ajv: ^8.20.0
  ajv-formats: ^3.0.1
  canonicalize: 3.0.0
  expo: ~56.0.12
  expo-crypto: ^56.0.4
  json-schema-to-ts: ^3.1.1
  uint8arrays: ^6.1.1

minimumReleaseAgeExclude:
  - '@kigu/*'
